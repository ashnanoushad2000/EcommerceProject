


<h2>Signup</h2>

<form (submit)="signup(); $event.preventDefault()">
  <input type="text" [(ngModel)]="name" name="name" placeholder="Name" required /><br><br>
  <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required /><br><br>
  <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required /><br><br>
  <button type="submit">Create Account</button>
  <p *ngIf="error" style="color: red;">{{ error }}</p>
</form>
